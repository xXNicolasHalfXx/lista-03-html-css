<!DOCTYPE html>
<html lang="pt-BR">

<main class="container">

    <section class="cards">

        <div class="card">
            <img src="pequeno grogu.webp" alt="Grogu">

            <p>Ele é muito fofo</p>
        </div>

        <div class="card">
            <img src="grogu força.webp" alt="Grogu">

        </div>

        <div class="card">
            <img src="grogu curioso.jpg" alt="Grogu">
            <h3>Terceiro Aspecto</h3>

        </div>

        <div class="card">
            <img src="grogu amigável.webp" alt="Grogu">

<footer class="footer">
